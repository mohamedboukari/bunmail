# BunMail — Docker Compose
#
# Starts the BunMail API server and a PostgreSQL database.
# Usage: docker compose up -d
#
# The app waits for PostgreSQL to be healthy before starting,
# then automatically runs database migrations on boot.
#
# Set POSTGRES_PASSWORD in your .env file (required).
# Never commit real credentials to version control.

services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:${PORT:-3000}" # HTTP API + Dashboard
      # Inbound SMTP is OFF by default. To enable: (1) uncomment the line below,
      # (2) set SMTP_ENABLED=true and SMTP_PORT=25 in your .env. See docs/inbound.md.
      # - "${SMTP_PORT:-25}:${SMTP_PORT:-25}"
      # SMTP submission (let apps send THROUGH BunMail) is OFF by default. To enable:
      # (1) uncomment the line below, (2) set SMTP_SUBMISSION_ENABLED=true in your .env.
      # See docs/smtp-submission.md.
      # - "${SMTP_SUBMISSION_PORT:-587}:${SMTP_SUBMISSION_PORT:-587}"
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-bunmail}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-bunmail}
      BUNMAIL_ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bunmail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-bunmail}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bunmail}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
