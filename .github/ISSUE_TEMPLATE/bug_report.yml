name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill out the sections below so we can reproduce the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Send a POST request to /api/v1/emails/send with ...
        2. Check the response ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version info and setup details.
      placeholder: |
        - BunMail version: 0.1.0
        - Bun version: 1.2.x
        - OS: Ubuntu 24.04 / macOS 15 / etc.
        - PostgreSQL version: 16
        - Docker: yes/no
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant logs or error messages.
      render: shell
