# BunMail — CI Pipeline
#
# Runs on every push and pull request to main.
# Steps: install → typecheck → lint → test

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://bunmail:bunmail@localhost:5432/bunmail_test
      API_KEY_SEED: ci_test_key_not_real
      DASHBOARD_PASSWORD: ci_test_pass
      MAIL_HOSTNAME: localhost

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bunmail
          POSTGRES_PASSWORD: bunmail
          POSTGRES_DB: bunmail_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U bunmail"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Audit dependencies
        run: bun pm untrusted || true

      - name: Type check
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test
