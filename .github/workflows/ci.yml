# BunMail — CI Pipeline
#
# Runs on every push and pull request to main.
# Steps: install → typecheck → lint → test

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://bunmail:bunmail@localhost:5432/bunmail_test
      API_KEY_SEED: ci_test_key_not_real
      DASHBOARD_PASSWORD: ci_test_pass
      MAIL_HOSTNAME: localhost

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bunmail
          POSTGRES_PASSWORD: bunmail
          POSTGRES_DB: bunmail_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U bunmail"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.10

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Audit untrusted lifecycle scripts
        # `bun pm untrusted` lists packages with postinstall scripts that
        # weren't allowlisted via `trustedDependencies`. Failing the build
        # makes a new untrusted dep visible at PR time instead of running
        # silently in every developer's local install.
        run: bun pm untrusted

      - name: Type check
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Test (unit)
        run: bun test test/unit

      - name: Test (e2e)
        run: bun test test/e2e
