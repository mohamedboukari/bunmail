# Auto-sync `bun.lock` for Dependabot PRs.
#
# Why this exists: Dependabot's npm ecosystem updates `package.json`
# and the lockfile it recognises (npm/yarn/pnpm), but does NOT
# understand `bun.lock` yet. The Dockerfile runs
# `bun install --frozen-lockfile`, which refuses a stale lockfile, so
# every Dependabot PR ships with a broken Trivy image scan.
#
# This workflow runs `bun install` on every Dependabot PR, detects
# any change to `bun.lock`, and commits it back to the PR branch so
# the rest of CI (Docker build / Trivy image scan / etc.) sees an
# in-sync lockfile.
#
# Security notes:
#   - `pull_request_target` runs in the BASE repo's context (full
#     write access on PRs from forks), which is required to push back
#     to the PR branch. Dependabot is a trusted internal actor on this
#     repo so the extra permissions are acceptable.
#   - `bun install --ignore-scripts` matches the Dockerfile's flag —
#     prevents Dependabot's bumped package from running arbitrary
#     postinstall code during the lockfile generation.
#   - The job gates on `github.actor == 'dependabot[bot]'`, so no
#     human PR can trigger the auto-push path.

name: Sync bun.lock for Dependabot

on:
  pull_request_target:
    paths:
      - "package.json"

permissions:
  contents: write
  pull-requests: read

jobs:
  sync:
    name: Sync bun.lock
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Check out the PR's HEAD so we can push commits back to it.
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          # Default GITHUB_TOKEN; works because permissions block above
          # grants `contents: write` and Dependabot PRs land on the
          # same repo (not a fork) so write access applies.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.10

      - name: Run bun install to regenerate lockfile
        # `--ignore-scripts` matches the Dockerfile's flag — no
        # arbitrary postinstall execution from the bumped package.
        run: bun install --ignore-scripts

      - name: Commit + push lockfile if it changed
        run: |
          if git diff --quiet bun.lock; then
            echo "bun.lock is already in sync — nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          git commit -m "chore: sync bun.lock for $(echo '${{ github.event.pull_request.title }}' | sed -e 's/^chore(deps): bump //' -e 's/^ci(deps): bump //')"
          git push
